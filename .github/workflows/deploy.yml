name: Build and Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: UAT

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Install Ant
        run: sudo apt-get install -y ant

      - name: Build WAR
        run: ant -f deploy/build.xml war

      - name: Deploy WAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "dist/HelloJSS.war"
          target: "/tmp/"

      - name: Configure DB and deploy to Tomcat
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e

            TOMCAT_HOME=${{ secrets.TOMCAT_HOME }}
            WAR_SOURCE="/tmp/dist/HelloJSS.war"
            WEBAPPS="$TOMCAT_HOME/webapps"

            # --- Write setenv.sh: Tomcat sources this on startup, no password stored ---
            echo ">>> Writing $TOMCAT_HOME/bin/setenv.sh ..."
            sudo tee "$TOMCAT_HOME/bin/setenv.sh" > /dev/null << 'SETENV'
            export HELLOJSS_DB_AUTH_MODE=iam
            export HELLOJSS_DB_HOST=database-1.cluster-chu0uc6ca4ie.ap-southeast-1.rds.amazonaws.com
            export HELLOJSS_DB_PORT=5432
            export HELLOJSS_DB_NAME=postgres
            export HELLOJSS_DB_USER=jsshello_user
            export HELLOJSS_AWS_REGION=ap-southeast-1
            SETENV
            sudo chmod 755 "$TOMCAT_HOME/bin/setenv.sh"

            # --- Deploy WAR ---
            echo ">>> Stopping Tomcat..."
            sudo "$TOMCAT_HOME/bin/shutdown.sh" || true
            sleep 5

            echo ">>> Removing old deployment..."
            sudo rm -rf "$WEBAPPS/HelloJSS" "$WEBAPPS/HelloJSS.war"

            echo ">>> Copying new WAR..."
            sudo cp "$WAR_SOURCE" "$WEBAPPS/HelloJSS.war"

            echo ">>> Starting Tomcat..."
            sudo "$TOMCAT_HOME/bin/startup.sh"

            echo ">>> Deploy complete!"
